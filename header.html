<script type="text/javascript">
    /* <![CDATA[ */
    let currentlyPlaying = null;

    class AudioPlayerWidget {
        constructor(container, audioUrl, fullPath) {
            this.container = container;
            this.audioUrl = audioUrl;
            this.fullPath = fullPath;
            this.init();
        }
    
        init() {
            // Existing initialization code...
            this.audio = document.createElement('audio');
            if(this.fullPath){
                this.audio.src = this.audioUrl;
            } else {
                this.audio.src = "https://raw.githubusercontent.com/JeremiasMeister/website-mila/main/" + this.audioUrl;
            }
            
            const title = this.container.querySelector('.title');
            const description = this.container.querySelector('.player-description');
            const controlsHtml = `
                <div class="controls-container">
                    <button class="play-btn">▶<\/button>
                    <span class="time">0:00<\/span>
                    <input type="range" class="time-slider" min="0" max="100" value="0" />
                    <span class="time duration">0:00<\/span>
                    <span class="download-btn" title="Download" role="button" tabindex="0" aria-label="Download">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 2v8M4.5 6.5L8 10l3.5-3.5M3 13.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        <\/svg>
                    <\/span>
                <\/div>
            `;
            
            if (description) {
                description.insertAdjacentHTML('afterend', controlsHtml);
            } else {
                title.insertAdjacentHTML('afterend', controlsHtml);
            }
            this.container.appendChild(this.audio);

            // Get elements
            this.playBtn = this.container.querySelector('.play-btn');
            this.timeSlider = this.container.querySelector('.time-slider');
            this.currentTime = this.container.querySelector('.time');
            this.durationDisplay = this.container.querySelector('.duration');
            this.downloadBtn = this.container.querySelector('.download-btn');

            this.bindEvents();
        }
    
        formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            seconds = Math.floor(seconds % 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
    
        updateTimeDisplay() {
            const percent = (this.audio.currentTime / this.audio.duration) * 100;
            this.timeSlider.value = percent;
            this.currentTime.textContent = this.formatTime(this.audio.currentTime);
        }

        pause() {
            if (!this.audio.paused) {
                this.audio.pause();
                this.playBtn.textContent = '▶';
            }
        }
    
        bindEvents() {
            this.playBtn.addEventListener('click', () => {
                if (this.audio.paused) {
                    this.audio.play();
                } else {
                    this.audio.pause();
                }
            });

            // Coordination lives on the media events so it also covers
            // playback started outside the button (media keys, lock screen)
            this.audio.addEventListener('play', () => {
                if (currentlyPlaying && currentlyPlaying !== this) {
                    currentlyPlaying.pause();
                }
                currentlyPlaying = this;
                this.playBtn.textContent = '⏸';
            });

            this.audio.addEventListener('pause', () => {
                this.playBtn.textContent = '▶';
                if (currentlyPlaying === this) currentlyPlaying = null;
            });

            // Rest of the existing event bindings...
            this.audio.addEventListener('loadedmetadata', () => {
                this.durationDisplay.textContent = this.formatTime(this.audio.duration);
                this.timeSlider.value = 0;
            });

            this.audio.addEventListener('timeupdate', () => this.updateTimeDisplay());

            this.audio.addEventListener('ended', () => {
                this.playBtn.textContent = '▶';
                this.timeSlider.value = 0;
                this.currentTime.textContent = '0:00';
                currentlyPlaying = null;
            });

            this.timeSlider.addEventListener('input', () => {
                const time = (this.timeSlider.value / 100) * this.audio.duration;
                this.currentTime.textContent = this.formatTime(time);
            });

            this.timeSlider.addEventListener('change', () => {
                const time = (this.timeSlider.value / 100) * this.audio.duration;
                this.audio.currentTime = time;
                if (!this.audio.paused) this.audio.play();
            });

            this.audio.addEventListener('error', () => {
                console.error('Error loading audio');
                this.playBtn.textContent = '⚠';
                this.playBtn.disabled = true;
            });

            // Fetch as blob so the download works cross-origin (a plain
            // <a download> would just open the file in the browser instead)
            this.downloadBtn.addEventListener('click', async () => {
                const src = this.audio.src;
                const filename = decodeURIComponent(src.split('/').pop().split('?')[0]) || 'audio';
                try {
                    const response = await fetch(src);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    console.error('Download failed, opening in new tab', e);
                    window.open(src, '_blank');
                }
            });
        }
    }
    
    class VideoPlayerWidget {
        constructor(container, videoUrl, fullPath) {
            this.container = container;
            if(fullPath){
                this.videoUrl = videoUrl;
            } else {
                this.videoUrl = "https://raw.githubusercontent.com/JeremiasMeister/website-mila/main/" + videoUrl;
            }
            
            this.init();
        }
    
        init() {
            // Keep the existing title
            const title = this.container.querySelector('.title');
            const description = this.container.querySelector('.player-description');
            
            // Create video element and controls
            const playerHtml = `
                <div class="video-wrapper">
                    <video src="${this.videoUrl}"><\/video>
                    <div class="video-overlay">
                        <span class="video-overlay-play">⏵<\/span>
                    <\/div>
                    <div class="video-controls">
                        <button class="video-play-btn">▶<\/button>
                        <span class="video-time">0:00<\/span>
                        <input type="range" class="video-time-slider" min="0" max="100" value="0" />
                        <span class="video-time duration">0:00<\/span>
                        <div class="volume-container">
                            <button class="volume-btn">�<\/button>
                            <input type="range" class="volume-slider" min="0" max="100" value="100" />
                        <\/div>
                        <button class="fullscreen-btn">⛶<\/button>
                    <\/div>
                <\/div>
            `;
            
            
            if (description) {
                description.insertAdjacentHTML('afterend', playerHtml);
            } else {
                title.insertAdjacentHTML('afterend', playerHtml);
            }
    
            // Get elements
            this.video = this.container.querySelector('video');
            this.playBtn = this.container.querySelector('.video-play-btn');
            this.timeSlider = this.container.querySelector('.video-time-slider');
            this.currentTime = this.container.querySelector('.video-time');
            this.durationDisplay = this.container.querySelector('.duration');
            this.volumeBtn = this.container.querySelector('.volume-btn');
            this.volumeSlider = this.container.querySelector('.volume-slider');
            this.fullscreenBtn = this.container.querySelector('.fullscreen-btn');
    
            this.bindEvents();
        }
    
        formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            seconds = Math.floor(seconds % 60);
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }
    
        updateTimeDisplay() {
            const percent = (this.video.currentTime / this.video.duration) * 100;
            this.timeSlider.value = percent;
            this.currentTime.textContent = this.formatTime(this.video.currentTime);
        }
    
        updatePlayIcon() {
            const overlayPlay = this.container.querySelector('.video-overlay-play');
            overlayPlay.textContent = this.video.paused ? '⏵' : '⏸';
        }

        pause() {
            if (!this.video.paused) {
                this.video.pause();
                this.playBtn.textContent = '▶';
                this.updatePlayIcon();
            }
        }
    
        bindEvents() {
            // Video events
            this.video.addEventListener('play', () => {
                if (currentlyPlaying && currentlyPlaying !== this) {
                    currentlyPlaying.pause();
                }
                currentlyPlaying = this;
                this.playBtn.textContent = '⏸';
                this.updatePlayIcon();
            });

            this.video.addEventListener('pause', () => {
                this.playBtn.textContent = '▶';
                this.updatePlayIcon();
                if (currentlyPlaying === this) currentlyPlaying = null;
            });
            this.video.addEventListener('loadedmetadata', () => {
                this.durationDisplay.textContent = this.formatTime(this.video.duration);
                this.timeSlider.value = 0;
            });
    
            this.video.addEventListener('timeupdate', () => this.updateTimeDisplay());
    
            this.video.addEventListener('ended', () => {
                this.playBtn.textContent = '▶';
                this.timeSlider.value = 0;
                this.currentTime.textContent = '0:00';
            });
    
            // Play/Pause button
            this.playBtn.addEventListener('click', () => {
                if (this.video.paused) {
                    this.video.play();
                } else {
                    this.video.pause();
                }
            });
    
            // Time slider
            this.timeSlider.addEventListener('input', () => {
                const time = (this.timeSlider.value / 100) * this.video.duration;
                this.currentTime.textContent = this.formatTime(time);
            });
    
            this.timeSlider.addEventListener('change', () => {
                const time = (this.timeSlider.value / 100) * this.video.duration;
                this.video.currentTime = time;
                if (!this.video.paused) this.video.play();
            });
    
            // Volume controls
            this.volumeSlider.addEventListener('input', () => {
                this.video.volume = this.volumeSlider.value / 100;
                this.updateVolumeIcon();
            });
    
            this.volumeBtn.addEventListener('click', () => {
                if (this.video.muted) {
                    this.video.muted = false;
                    this.volumeSlider.value = this.video.volume * 100;
                } else {
                    this.video.muted = true;
                    this.volumeSlider.value = 0;
                }
                this.updateVolumeIcon();
            });
    
            // Fullscreen
            this.fullscreenBtn.addEventListener('click', () => {
                const videoWrapper = this.container.querySelector('.video-wrapper');
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                    videoWrapper.style.padding = '56.25%';
                } else {
                    if (videoWrapper.requestFullscreen) {
                        videoWrapper.requestFullscreen().then(() => {
                            videoWrapper.style.padding = '0';
                            videoWrapper.style.height = '100vh';
                        });
                    }
                }
            });
    
            // Video overlay play/pause
            const videoWrapper = this.container.querySelector('.video-wrapper');
            videoWrapper.addEventListener('click', () => {
                if (this.video.paused) {
                    this.video.play();
                } else {
                    this.video.pause();
                }
            });
    
            // Error handling
            this.video.addEventListener('error', () => {
                console.error('Error loading video');
                this.playBtn.textContent = '⚠';
                this.playBtn.disabled = true;
            });
        }
    
        updateVolumeIcon() {
            if (this.video.muted || this.video.volume === 0) {
                this.volumeBtn.innerHTML = '&#x1F507;';  // muted
            } else if (this.video.volume < 0.5) {
                this.volumeBtn.innerHTML = '&#x1F509;';  // low volume
            } else {
                this.volumeBtn.innerHTML = '&#x1F50A;';  // high volume
            }
        }
    }

    class LogoItemWidget {
        constructor(container) {
            this.container = container;
            this.imgSrc = this.container.dataset.imgSrc;
            this.linkUrl = this.container.dataset.linkUrl;
            this.altText = this.container.dataset.altText || 'Kundenlogo';
            this.customerName = this.container.dataset.customerName || 'Kunde';
            this.isFullPath = this.container.dataset.fullPath === 'true';
            this.init();
        }

        init() {
            if (!this.linkUrl || (!this.imgSrc && !this.container.dataset.customerName)) {
                console.error('Missing data for LogoItemWidget: link-url and img-src or customer-name required.', this.container);
                this.container.innerHTML = '<p style="color:red; font-size:12px;">Fehler: missing image files.<\/p>';
                return;
            }

            // text tile: no image given, render the customer name instead
            if (!this.imgSrc) {
                this.container.innerHTML = `
                    <a href="${this.linkUrl}" target="_blank" title="Visit ${this.customerName}">
                        <span class="j-module n j-header logo-tile-text">${this.customerName}<\/span>
                    <\/a>
                `;
                return;
            }

            let finalImgSrc;
            if (this.isFullPath) {
                finalImgSrc = this.imgSrc;
            } else {
                finalImgSrc = "https://raw.githubusercontent.com/JeremiasMeister/website-mila/main/" + this.imgSrc;
            }

            const logoHtml = `
                <a href="${this.linkUrl}" target="_blank" title="Visit ${this.customerName}">
                    <img src="${finalImgSrc}" alt="${this.altText}" onerror="this.style.display='none'; console.error('Missing Image: ${finalImgSrc}')">
                <\/a>
            `;

            this.container.innerHTML = logoHtml;
        }
    }
    
    class PdfViewerWidget {
        constructor(container, pdfUrl, fullPath) {
            this.container = container;
            this.fullPath = (fullPath === 'true' || fullPath === true);
            if (this.fullPath) {
                this.pdfUrl = pdfUrl;
            } else {
                this.pdfUrl = "https://raw.githubusercontent.com/JeremiasMeister/website-mila/main/" + pdfUrl;
            }
            this.init();
        }

        init() {
            if (!this.pdfUrl || this.pdfUrl.endsWith('/')) {
                console.error('Missing data for PdfViewerWidget: pdf-url not found.', this.container);
                this.container.innerHTML = '<p style="color:red; font-size:12px;">Fehler: PDF URL fehlt.<\/p>';
                return;
            }

            const title = this.container.querySelector('.title');
            const description = this.container.querySelector('.player-description');

            const viewerHtml = `
                <div class="pdf-actions">
                    <a class="j-calltoaction-link j-calltoaction-link-style-1" data-action="button" href="${this.pdfUrl}" download data-title="Download">Download<\/a>
                <\/div>
                <div class="pdf-pages">
                    <div class="pdf-loading">Lade PDF…<\/div>
                <\/div>
            `;

            if (description) {
                description.insertAdjacentHTML('afterend', viewerHtml);
            } else if (title) {
                title.insertAdjacentHTML('afterend', viewerHtml);
            } else {
                this.container.insertAdjacentHTML('afterbegin', viewerHtml);
            }

            this.pagesContainer = this.container.querySelector('.pdf-pages');
            this.loadAndRender();
        }

        showMessage(text, className) {
            this.pagesContainer.innerHTML =
                '<div class="' + className + '">' + text + '<\/div>';
        }

        async loadAndRender() {
            if (typeof pdfjsLib === 'undefined') {
                this.showMessage('PDF-Viewer konnte nicht geladen werden.', 'pdf-error');
                return;
            }

            try {
                const pdf = await pdfjsLib.getDocument(this.pdfUrl).promise;
                this.pagesContainer.innerHTML = '';

                const containerWidth = this.pagesContainer.clientWidth || 770;
                const dpr = window.devicePixelRatio || 1;

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const unscaled = page.getViewport({ scale: 1 });
                    const fitScale = containerWidth / unscaled.width;
                    const viewport = page.getViewport({ scale: fitScale * dpr });

                    const canvas = document.createElement('canvas');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    this.pagesContainer.appendChild(canvas);

                    await page.render({
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    }).promise;
                }
            } catch (err) {
                console.error('PDF load error:', err);
                this.showMessage('Vita konnte nicht geladen werden.', 'pdf-error');
            }
        }
    }

            newLink.target = "_blank";
            newLink.rel = "noopener noreferrer";
            
        
            // 4. The Image and Text

            newLink.innerHTML = `

                 alt="Synchronstar Icon" 
                 style="height: 16px; width: auto; margin-right: 5px; vertical-align: -3px;">
            <span style="position: relative;">Synchronstar<\/span>
        `;

            // 5. Insert before the Copyright line
            var breakTag = metaLinks.querySelector('br');
            
            if (breakTag) {
                metaLinks.insertBefore(separator, breakTag);
                metaLinks.insertBefore(newLink, breakTag);
            } else {
                metaLinks.appendChild(separator);
                metaLinks.appendChild(newLink);
            }
        }
        
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                if (currentlyPlaying) {
                    currentlyPlaying.pause();
                    currentlyPlaying = null;
                }
                
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        document.querySelectorAll('.custom-audio-player-2024').forEach(container => {

        document.querySelectorAll('.custom-video-player-2024').forEach(container => {

        document.querySelectorAll('.custom-logo-item-2024').forEach(container => {
            new LogoItemWidget(container);
        });

        document.querySelectorAll('.custom-pdf-viewer-2024').forEach(container => {
            new PdfViewerWidget(container, container.dataset.pdfUrl, container.dataset.fullPath);
        });

        function layoutLogoGalleries() {
            const maxCols = window.innerWidth <= 480 ? 2
                          : window.innerWidth <= 768 ? 3
                          : 5;
            document.querySelectorAll('.logo-gallery-items-2024').forEach(gallery => {
                const n = gallery.querySelectorAll('.custom-logo-item-2024').length;
                if (n === 0) return;
                const rows = Math.ceil(n / maxCols);
                const cols = Math.max(1, Math.ceil(n / rows));
                gallery.style.setProperty('--logo-cols', cols);
            });
        }
        layoutLogoGalleries();
        window.addEventListener('resize', layoutLogoGalleries);
        
         // Add scroll handler for navigation opacity
        const header = document.querySelector('.jtpl-header');
        if (header) {
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    header.style.backgroundColor = 'rgb(0, 0, 0)'; // Fully opaque black
                    header.style.transition = 'background-color 0.8s ease';
                } else {
                    header.style.backgroundColor = 'rgba(0, 0, 0, 0.65)'; // Original transparency
                }
            });
        }
    });
